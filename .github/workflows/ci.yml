name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  app:
    name: app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: cd app && npm ci

      - name: Run tests
        run: cd app && npm test

      - name: Verify @shared imports resolve
        run: node scripts/verify-shared-imports.mjs

  shared:
    name: shared
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: shared/package-lock.json

      - name: Install dependencies
        run: cd shared && npm ci

      - name: Run tests
        run: cd shared && npm test

      - name: Typecheck
        run: cd shared && npm run check

  pipeline:
    name: pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install pipeline dependencies
        run: cd pipeline && uv sync

      - name: Run corpus preflight fixture
        run: |
          cd pipeline
          uv run python -m plato_pipeline.preflight \
            tests/fixtures/preflight/valid/data \
            tests/fixtures/preflight/valid/manifests

      - name: Run pipeline tests
        run: |
          cd pipeline
          set +e
          uv run --with pytest pytest
          code=$?
          set -e
          # pytest exits 5 when no tests are collected; pipeline tests have not
          # landed yet, so tolerate only that documented no-tests status here.
          if [ "$code" -ne 0 ] && [ "$code" -ne 5 ]; then
            exit "$code"
          fi
