# Hippias Major — pipeline manifest (Stephanus, generated for the bookless rollout)
#
# Plato is cited by Stephanus page + section (281a, ... 304e), not
# by Bekker page. See manifests/Euthyphro.yaml for the full scheme-contract
# commentary (stage1/stage2/stage7 dispatch on citation.scheme).

work:
  id: HippiasMajor
  title: "Hippias Major"
  author: "Plato"
  tlg_author: "0059"
  tlg_work: "025"
  greek_edition: "Burnet, Platonis Opera vol. 3 (OCT, 1903)"

citation:
  scheme: stephanus
  hideLineNumbers: true

# No canonical speaker-label map filled in for this rollout pass — labels
# render as-is (empty map is fine per the scheme contract).
speakers:
  # Greek OCT siglum -> canonical English interlocutor name.
  sigla:
    "ΣΩ.": "Socrates"
    "ΙΠ.": "Hippias"

english:
  primary:
    id: fowler
    name: "H. N. Fowler (Loeb, 1926)"
    model: perseus_stephanus
    file: "perseus-eng/tlg0059.tlg025.perseus-eng2.xml"

# Verified, edition-faithful section gaps: none declared yet for this
# generated pass (stage2's observed-schemed validator demotes intra-column
# line gaps for stephanus automatically; report any REAL column-order gaps
# stage2 surfaces back for review).
expected_section_gaps: []
section_spine: { count: 119, sha256: a77f3bb56285c9315d7a61c9259ad23c11b25f1e040729e5b99679341f37a1e1 }

# The Stephanus span from docs/registry-draft.md: 281a-304e.
# Single, undivided work -> one book. Start/end use line 1 / line 99 as safe
# outer bounds (book_for_line only needs to bracket the observed spine; lines
# restart per section and are not user-facing under this scheme).
books:
  - { n: 1, start: "281a1", end: "304e99" }

sources:
  tlg_dir_env: "TLG_DIR"
  tlg_dir_default: "../TLG Files/TLG"
  diogenes_server: "/Applications/Diogenes.app/Contents/server"
  diogenes_data: "/Applications/Diogenes.app/Contents/dependencies/data"
