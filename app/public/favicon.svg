<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
    <!-- Simple geometric Pi (Π) — Plato's initial, monoline/architectural so it
         stays crisp at 16px. Teal on transparent (no background chip): reads
         on both light and dark browser chrome without a fill-box to contrast. -->
    <rect x="4" y="4" width="24" height="5" rx="1" fill="#1f6f7a"/>
    <rect x="4" y="9" width="5" height="19" rx="1" fill="#1f6f7a"/>
    <rect x="23" y="9" width="5" height="19" rx="1" fill="#1f6f7a"/>
</svg>
